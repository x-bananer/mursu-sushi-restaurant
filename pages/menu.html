<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Menu</title>

  <!-- global styles -->
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/global.css" />

  <!-- page styles -->
  <link rel="stylesheet" href="../styles/pages/menu.css" />

  <!-- shared styles -->
  <link rel="stylesheet" href="../styles/pages/shared.css" />
</head>

<body>

  <div class="page">

    <!-- Header (copied from shared.html) -->
    <header class="header">MURSU</header>

    <!-- Hero -->
    <section class="menu-hero">
      <h1 class="menu-hero__title">Today’s special</h1>
    </section>

    <!-- Categories (component) -->
    <nav class="categories">
      <button class="categories__item categories__item--active">Sashimi</button>
      <button class="categories__item">Nigiri</button>
      <button class="categories__item">Maki</button>
    </nav>

    <!-- Menu -->
    <section class="menu">

      <!-- Card (copied from shared.html) -->
      <div class="card">
        <h3 class="card__title">Sake</h3>
        <p class="card__price">24€</p>
      </div>

      <div class="card card--active">
        <h3 class="card__title">Yasai</h3>
        <p class="card__price">18€</p>
      </div>

    </section>

    <!-- Footer (copied from shared.html) -->
    <footer class="footer">Footer</footer>

  </div>

</body>
</html>
