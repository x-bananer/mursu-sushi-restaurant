					<section class="profile__header">
						<div class="profile__user">
							<div class="profile__avatar">
								<svg
									viewBox="0 0 48 48"

										cy="24"

										stroke="currentColor"
										stroke-width="2"
										stroke-linecap="round"
									/>
								</svg>
							</div>

							<div class="profile__identity">
								<h1 class="profile__name">Matti Korhonen</h1>
								<p class="profile__meta">
									Member since Jan 2025
								</p>
							</div>
						</div>

						<div class="profile__actions">
							<button class="btn btn--light" type="button">
								Edit Profile
							</button>
						</div>
					</section>

					<!-- STATS -->
					<section class="profile__stats">
						<!-- LOYALTY -->
						<div class="profile__block profile__loyalty">
							<p class="profile__label">Loyalty Stamps</p>

							<div class="profile__stamps">
								<span
									class="profile__stamp profile__stamp--active"
								>
									★
								</span>
								<span class="profile__stamp"></span>
								<span class="profile__stamp"></span>
								<span class="profile__stamp"></span>
								<span class="profile__stamp"></span>
							</div>

							<p class="profile__hint">
								4 more purchases until 10% discount.
							</p>
						</div>

						<!-- REWARDS -->
						<div class="profile__block profile__rewards">
							<p class="profile__label">Rewards Earned</p>
							<p class="profile__rewards-value">12</p>
						</div>
					</section>

					<!-- MILESTONE -->
					<section class="profile__milestone">
						<p class="profile__label">Next Milestone</p>
						<p class="profile__milestone-text">
							Reward unlocked: 10% off your next order
						</p>
					</section>
				</div>
			</div>
