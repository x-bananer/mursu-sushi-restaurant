<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>

  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="../styles/pages/profile.css" />
</head>

<body>

  <div class="page">

    <!-- Header component - COPIED FROM SHARED FILE -->
    <header class="header">MURSU</header>

    <!-- Profile hero -->
    <section class="profile">
      <h1 class="profile__name">Matti Korhonen</h1>
      <p class="profile__meta">Member since Jan 2025</p>
    </section>

    <!-- Badges component -->
    <section class="badges">
      <div class="badge">Early adopter</div>
      <div class="badge">Week streak</div>
      <div class="badge badge--locked">Locked</div>
    </section>

    <!-- Combos (list component) -->
    <section class="combos">

      <!-- Combo item -->
      <div class="combo">
        <div class="combo__title">Morning Obsidian</div>
        <div class="combo__price">€12.50</div>
        <button class="button">Re-order</button>
      </div>

      <div class="combo">
        <div class="combo__title">Architect’s Lunch</div>
        <div class="combo__price">€16.00</div>
        <button class="button">Re-order</button>
      </div>

    </section>

    <!-- Stats component -->
    <section class="stats">
      <div class="stat">
        <div class="stat__value">42</div>
        <div class="stat__label">Visits</div>
      </div>

      <div class="stat">
        <div class="stat__value">1,240</div>
        <div class="stat__label">Points</div>
      </div>
    </section>

    <!-- Footer component - COPIED FROM SHARED FILE-->
    <footer class="footer">Footer</footer>

  </div>

</body>
</html>
