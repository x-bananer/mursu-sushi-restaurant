<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin — Mursu</title>
        <link rel="stylesheet" href="../../styles/index.css" />
        <link rel="stylesheet" href="adm-panel.css" />
    </head>
    <body class="admin-body">
	<!-- admin header -->
		<header class="header">
			<!-- admin nav -->
			<nav class="nav layout">
				<div class="nav__left"></div>

				<div class="nav__center">
					<a href="./admin.html" class="nav__logo">
						<span class="nav__logo-letter nav__logo-letter--1">
							<span class="nav__logo-face">Mu</span>
							<span class="nav__logo-back">ム</span>
						</span>
						<span class="nav__logo-letter nav__logo-letter--2">
							<span class="nav__logo-face">r</span>
							<span class="nav__logo-back">ル</span>
						</span>
						<span class="nav__logo-letter nav__logo-letter--3">
							<span class="nav__logo-face">su</span>
							<span class="nav__logo-back">ス</span>
						</span>
					</a>
				</div>

				<div class="nav__right">
					<button class="nav__link" type="button">🇫🇮 FI</button>
					<a href="./profile.html" class="nav__link nav__icon-link">
						<svg
							viewBox="0 0 48 48"
							fill="none"
							xmlns="http://www.w3.org/2000/svg"
						>
							<circle
								cx="24"
								cy="24"
								r="18"
								stroke="currentColor"
								stroke-width="2"
							/>
							<circle
								cx="24"
								cy="18"
								r="5"
								stroke="currentColor"
								stroke-width="2"
							/>
							<path
								d="M14 34C14 29 18 26 24 26C30 26 34 29 34 34"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
							/>
						</svg>
					</a>
				</div>
			</nav>
		</header>
        <div class="admin-shell">
			<!-- ── sidebar ── -->
            <aside class="admin-sidebar">
                <nav class="admin-nav">

                    <label class="admin-nav__item" for="nav-dashboard">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        Dashboard
                    </label>

                    <label class="admin-nav__item" for="nav-live-orders">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 2V4M12 20V22M2 12H4M20 12H22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

                    <label class="admin-nav__item" for="nav-menu-editor">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="5" width="18" height="2" rx="1" fill="currentColor"/>
                            <rect x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
                            <rect x="3" y="17" width="12" height="2" rx="1" fill="currentColor"/>
                        </svg>
                        Menu Editor
                    </label>

                    <label class="admin-nav__item" for="nav-daily-special">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L14.4 8.8H21.6L15.8 12.9L18.2 19.7L12 15.6L5.8 19.7L8.2 12.9L2.4 8.8H9.6L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>

                    <label class="admin-nav__item" for="nav-customers">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">

                            <path d="M18 14V17L20 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>

                    </label>

                    <label class="admin-nav__item" for="nav-reviews">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <path d="M21 15C21 16.1 20.1 17 19 17H7L3 21V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V15Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                        Reviews
                    </label>

                    <label class="admin-nav__item" for="nav-settings">
                        <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>

                        Settings
                    </label>

                </nav>
            </aside>


        </div><!-- /admin-shell -->

    </body>
</html>
