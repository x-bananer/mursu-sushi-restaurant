<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login / Register</title>
		<link rel="stylesheet" href="../../styles/index.css" />
		<link rel="stylesheet" href="./login.css" />
	</head>
	<body>
		<header class="header">
			<nav class="nav layout">
				<div class="nav__left">
					<a
						href="../menu/menu.html"
						class="nav__link nav__link--active"
						>MENU</a
					>
					<a href="../combo/combo.html" class="nav__link"
						>BUILD A SET</a
					>
				</div>

				<div class="nav__center">
					<a href="../index.html" class="nav__logo">
						<span class="nav__logo-letter nav__logo-letter--1">
							<span class="nav__logo-face">Mu</span>
							<span class="nav__logo-back">ム</span>
						</span>
						<span class="nav__logo-letter nav__logo-letter--2">
							<span class="nav__logo-face">r</span>
							<span class="nav__logo-back">ル</span>
						</span>
						<span class="nav__logo-letter nav__logo-letter--3">
							<span class="nav__logo-face">su</span>
							<span class="nav__logo-back">ス</span>
						</span>
					</a>
				</div>

				<div class="nav__right">
					<button class="nav__link" type="button">🇫🇮 FI</button>
					<a href="./login.html" class="nav__link nav__icon-link">
						<svg
							viewBox="0 0 48 48"
							fill="none"
							xmlns="http://www.w3.org/2000/svg"
						>
							<circle
								cx="24"
								cy="24"
								r="18"
								stroke="currentColor"
								stroke-width="2"
							/>
							<circle
								cx="24"
								cy="18"
								r="5"
								stroke="currentColor"
								stroke-width="2"
							/>
							<path
								d="M14 34C14 29 18 26 24 26C30 26 34 29 34 34"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
							/>
						</svg>
					</a>

					<a
						href="../cart/cart.html"
						class="nav__link nav__icon-link"
					>
						CART
					</a>
				</div>
			</nav>
		</header>

		<nav class="bottom-nav">
			<div class="bottom-nav__container layout">
				<a href="../menu/menu.html" class="bottom-nav__link">MENU</a>
				<a href="../combo/combo.html" class="bottom-nav__link">COMBO</a>
				<a href="./login.html" class="bottom-nav__link">LOGIN</a>
				<a href="../cart/cart.html" class="bottom-nav__link">CART</a>
			</div>
		</nav>

		<main class="layout page auth-wrapper">
			<div class="auth-card">
				<div class="auth-card__tabs">
					<div class="auth-card__tab auth-card__tab--inactive">
						SIGN IN
					</div>
					<div class="auth-card__tab auth-card__tab--active">
						CREATE ACCOUNT
					</div>
				</div>

				<form class="auth-card__body" id="form-register">
					<div class="auth-card__row">
						<label class="input-field">
							<span class="input-field__label">FIRST NAME</span>
							<input
								class="input-field__input"
								type="text"
								placeholder="YUKIO"
							/>
						</label>
						<label class="input-field">
							<span class="input-field__label">LAST NAME</span>
							<input
								class="input-field__input"
								type="text"
								placeholder="MISHIMA"
							/>
						</label>
					</div>

					<label class="input-field">
						<span class="input-field__label">EMAIL ADDRESS</span>
						<input
							class="input-field__input"
							type="email"
							placeholder="ARCHITECT@MURSU.ZEN"
						/>
					</label>
					<label class="input-field">
						<span class="input-field__label">PASSWORD</span>
						<input
							class="input-field__input"
							type="password"
							placeholder="••••••••••"
						/>
					</label>

					<div class="auth-card__actions">
						<button
							class="btn btn--light auth-card__btn"
							type="button"
						>
							CREATE ACCOUNT
						</button>
						<button
							class="btn btn--link auth-card__btn auth-card__btn--secondary"
							type="button"
						>
							CONTINUE AS GUEST
						</button>
					</div>

					<div class="auth-card__footer">
						<a href="#" class="auth-card__link"
							>FORGOT CREDENTIALS?</a
						>
						<a href="#" class="auth-card__link"
							>STAFF? ADMIN PANEL IS AT /ADMIN ↗</a
						>
					</div>
				</form>
			</div>
		</main>

		<footer class="footer">
			<div class="footer__content layout">
				© 2026 MURSU. Sushi restaurant.
			</div>
		</footer>
	</body>
</html>
