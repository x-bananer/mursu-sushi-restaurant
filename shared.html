<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- shared styles -->
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/global.css" />
  <link rel="stylesheet" href="./shared.css" />
</head>

<body>

  <!-- Header component -->
  <header class="header">
    <div class="header__logo">MURSU</div>
    <nav class="header__nav">
      <a class="header__link">Menu</a>
      <a class="header__link">Sign in</a>
    </nav>
  </header>

  <!-- Button component -->
  <button class="button">Default</button>
  <button class="button button--primary">Primary</button>

  <!-- Input component -->
  <div class="input">
    <input class="input__field" placeholder="Type here..." />
  </div>

  <!-- Card component -->
  <div class="card">
    <h3 class="card__title">Sake</h3>
    <p class="card__price">24€</p>
    <button class="button">Add</button>
  </div>

  <!-- Footer component -->
  <footer class="footer">
    <div class="footer__links">
      <a>Menu</a>
      <a>Locations</a>
      <a>Info</a>
    </div>
  </footer>

</body>
</html>
